<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Basic Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 40px;
      background: #f5f5f5;
    }
    .card {
      max-width: 700px;
      margin: 0 auto;
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }
    h1 { margin-top: 0; }
    button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Hello, World! 👋</h1>
    <p>This is a basic HTML file with a little CSS and JavaScript.</p>

    <button onclick="sayHi()">Click me</button>
    <p id="msg"></p>
  </div>

  <script>
    function sayHi() {
      document.getElementById("msg").innerText = "Button clicked ✅";
    }
  </script>
</body>
</html>
